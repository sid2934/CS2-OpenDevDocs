description: >
  CS2-specific game event protobuf messages.  These are temporary entity (TE)
  events and game events broadcast from the server to clients that are within
  the relevant PVS or listening for the event type.  Identified by the
  ECsgoGameEvents enum (450–453).

messages:
  CMsgTEPlayerAnimEvent:
    description: >
      Temporary entity event that triggers a networked animation event on a
      player's animation graph (jumps, land, crouch transitions, etc.).
    fields:
      player:
        description: "Entity handle (packed as fixed32) of the player triggering the animation event."
      event:
        description: "Animation event ID matching an entry in the player's animation graph."
      data:
        description: "Optional integer payload passed to the animation event handler."

  CMsgTEFireBullets:
    description: >
      Temporary entity event broadcast when a player fires a weapon.
      Received by all clients within PVS range of the shooter's origin.
    notes: >
      The seed field allows clients to reproduce the exact bullet spread
      using the same PRNG as the server, enabling accurate hit-registration
      replay in demo parsers.
    fields:
      seed:
        description: "PRNG seed used to reproduce the bullet spread trajectory."
      weapon_id:
        description: >
          Item definition index (item_definition_index_t) of the weapon fired.
          Maps to entries in items_game.txt.
      mode:
        description: "Fire mode – 0 for primary, 1 for secondary/burst."
      inaccuracy:
        description: "Inaccuracy value at time of fire, affecting spread cone."
      recoil_index:
        description: "Recoil accumulator index used for kick-back calculations."
      player:
        description: "Entity handle of the player who fired (packed as fixed32)."
      num_bullets_remaining:
        description: "Clip ammo remaining after this shot."
      origin:
        description: "World-space muzzle position from which the bullet was fired."
      angles:
        description: "Aim angles (pitch, yaw) at the moment of fire."
      spread:
        description: "Weapon spread value at time of fire."
      sound_type:
        description: "Sound type index controlling which fire-sound variant plays."
      item_def_index:
        description: "Item definition index of the firing weapon (same as weapon_id for most weapons)."
      sound_dsp_effect:
        description: "DSP (digital signal processing) effect hash applied to the fire sound."
      ent_origin:
        description: "World-space origin of the firing entity (may differ from muzzle origin for some weapon types)."
      attack_type:
        description: "Attack type identifier (0 = primary, other values for special modes)."
      player_inair:
        description: "True when the player was airborne at the moment of firing."
      player_scoped:
        description: "True when the player was zoomed/scoped at the moment of firing."
      tick:
        description: "Server tick on which the shot was fired."
      extra:
        description: "Optional nested Extra message with additional precision data for demo analysis."

  CMsgTERadioIcon:
    description: >
      Triggers the radio-icon animation above a player's head when they use a
      radio command, showing team-mates which player is communicating.
    fields:
      player:
        description: "Entity handle (packed as fixed32) of the player using the radio command."

  CMsgPlayerBulletHit:
    description: >
      Sent to the attacker (and optionally team) when a bullet registers a hit.
      Used by the client to display hit-marker feedback and play hit sounds.
    fields:
      attacker_slot:
        description: "Player slot index of the shooter."
      victim_slot:
        description: "Player slot index of the entity that was hit."
      victim_pos:
        description: "World-space position of the victim at the moment of impact."
      hit_group:
        description: "Hit-group constant (head=1, chest=2, stomach=3, leftarm=4, rightarm=5, leftleg=6, rightleg=7)."
      damage:
        description: "Raw damage dealt before armour reduction."
      is_kill:
        description: "True if this hit resulted in the victim's death."
      penetration_count:
        description: "Number of surfaces the bullet penetrated before this hit."

