# docs/overlays/protobufs/cstrike15_usermessages.yml
#
# Overlay for Protobufs/cstrike15_usermessages.proto
#
# Sources: HL2SDK (alliedmodders/hl2sdk cs2 branch), AlliedModders wiki,
#          CS:GO/CS2 userdata reverse-engineering by the community.

description: >
  CS2 user-messages sent reliably from server to one or more clients.  These
  messages carry HUD feedback, audio triggers, economy updates, and kill-cam
  data.  They are identified by the ECstrike15UserMessages enum (IDs 301–388).

messages:
  CCSUsrMsg_VGUIMenu:
    description: >
      Opens or closes a VGUI panel on the client.  Used to trigger buy menus,
      team-selection screens, and other UI panels.
    fields:
      name:
        description: "Panel name string identifying which VGUI menu to show/hide."
      show:
        description: "True to open the panel, false to close it."
      keys:
        description: "Optional key-value pairs passed to the panel's initialization code."

  CCSUsrMsg_Geiger:
    description: >
      Legacy Geiger-counter sound message inherited from Half-Life; not used in
      CS2 gameplay but retained for protocol compatibility.
    fields:
      range:
        description: "Distance value that determined Geiger sound frequency in HL1."

  CCSUsrMsg_Train:
    description: >
      Controls the on-screen train speed/direction indicator (legacy HL1 message).
    fields:
      train:
        description: "Train-control state integer."

  CCSUsrMsg_HudText:
    description: >
      Displays a plain text string in the centre of the HUD for a brief period.
    fields:
      text:
        description: "UTF-8 string to display on the HUD."

  CCSUsrMsg_HudMsg:
    description: >
      Displays a richly formatted HUD message with custom position, colour,
      fade-in/out timing, and special effects.
    fields:
      channel:
        description: "HUD channel index (0–3); newer messages on the same channel replace older ones."
      pos:
        description: "Normalised (0–1) screen-space position of the message."
      clr1:
        description: "Primary text colour (RGBA)."
      clr2:
        description: "Secondary/effect colour (RGBA)."
      effect:
        description: "Text effect type (0 = none, 1 = flicker, 2 = fade-in)."
      fade_in_time:
        description: "Time in seconds for the message to fade in."
      fade_out_time:
        description: "Time in seconds for the message to fade out."
      hold_time:
        description: "Time in seconds to hold the message at full opacity."
      fx_time:
        description: "Duration in seconds of the special text effect."
      text:
        description: "UTF-8 message string to display."

  CCSUsrMsg_Shake:
    description: >
      Applies a camera-shake effect on the receiving client.  Used for nearby
      explosions, heavy landing impacts, and environmental effects.
    fields:
      command:
        description: "Shake command: 0 = start, 1 = stop, 2 = amplitude (additive)."
      local_amplitude:
        description: "Peak displacement of the shake in world units."
      frequency:
        description: "Oscillation frequency of the shake in Hz."
      duration:
        description: "Duration of the shake in seconds."

  CCSUsrMsg_Fade:
    description: >
      Fades the client's screen to or from a solid colour.  Used for flash-bang
      recovery, level transitions, and damage feedback.
    fields:
      duration:
        description: "Duration of the fade in 1/100ths of a second."
      hold_time:
        description: "Time in 1/100ths of a second to hold the peak colour before fading back."
      flags:
        description: "Flags: 0x0001 = fade-in (screen → colour), 0x0002 = fade-out (colour → screen), 0x0004 = modulate (multiplicative), 0x0008 = stayout."
      clr:
        description: "Target RGBA colour of the full-screen overlay."

  CCSUsrMsg_Rumble:
    description: >
      Triggers a gamepad rumble pattern on the receiving client.
    fields:
      index:
        description: "Rumble-effect preset index."
      data:
        description: "Additional data parameter for the rumble effect."
      flags:
        description: "Rumble control flags."

  CCSUsrMsg_CloseCaption:
    description: >
      Displays a closed-caption subtitle string on the client by localization
      token hash.
    fields:
      hash:
        description: "CRC32 hash of the localization token for the caption string."
      duration:
        description: "Display duration in 1/10ths of a second."
      from_player:
        description: "True when the caption originates from player speech (enables speaker indicator)."
      cctoken:
        description: "Plaintext localization token (fallback when hash lookup fails)."

  CCSUsrMsg_SendAudio:
    description: >
      Plays a named radio-command audio file on the client (radio-wheel voice
      lines).
    fields:
      radio_sound:
        description: "Sound event name or path of the radio voice-line to play."

  CCSUsrMsg_RawAudio:
    description: >
      Streams raw voice audio from a player to a spectator or teammate.
    fields:
      pitch:
        description: "Playback pitch shift applied to the voice audio."
      entidx:
        description: "Entity index of the player speaking."
      duration:
        description: "Duration of the audio clip in seconds."
      voice_filename:
        description: "Path to the voice audio file."

  CCSUsrMsg_VoiceMask:
    description: >
      Pushes the server's voice-mute state to clients so they know which players
      are muted globally.
    fields:
      player_masks:
        description: "Per-player mute bitmasks; one entry per possible player slot."
      player_mod_enable:
        description: "True when the player-controlled muting overrides are active."

  CCSUsrMsg_Damage:
    description: >
      Notifies the receiving client about incoming damage so the directional
      damage indicator can be displayed.
    fields:
      amount:
        description: "Amount of damage dealt (used to scale the indicator intensity)."
      inflictor_world_pos:
        description: "World-space position of the damage source (used to compute indicator direction)."
      victim_entindex:
        description: "Entity index of the player who received the damage."

  CCSUsrMsg_RadioText:
    description: >
      Displays a radio-command message in the text chat area.
    fields:
      msg_dst:
        description: "Destination filter: 0 = team only, 1 = global."
      client:
        description: "Player slot index of the radio sender."
      msg_name:
        description: "Radio-command name/localization token."
      params:
        description: "Substitution parameters inserted into the radio command string."

  CCSUsrMsg_HintText:
    description: >
      Displays a game-hint text in the hint area of the HUD (below the centre
      of the screen).
    fields:
      message:
        description: "Localization token or plain string for the hint."

  CCSUsrMsg_KeyHintText:
    description: >
      Displays multiple key-binding hint strings in the hint area (used for
      context-sensitive prompts like 'Press [USE] to pick up hostage').
    fields:
      messages:
        description: "List of localization tokens for each key-hint line."

  CCSUsrMsg_ProcessSpottedEntityUpdate:
    description: >
      Pushes an incremental update to the client's radar entity-spotted list,
      keeping the minimap positions of spotted enemies and the bomb in sync.
    fields:
      new_update:
        description: "True when this is a fresh full update rather than a delta update."
      entity_updates:
        description: "List of spotted-entity records, each containing position, class, and equipment status."

  CCSUsrMsg_ReloadEffect:
    description: >
      Triggers a weapon-reload visual effect at the specified world position
      (shell casing eject, etc.) on remote clients.
    fields:
      entidx:
        description: "Entity index of the weapon being reloaded."
      actanim:
        description: "Activity/animation index that triggered the reload effect."
      origin_x:
        description: "X world-space coordinate of the effect origin."
      origin_y:
        description: "Y world-space coordinate of the effect origin."
      origin_z:
        description: "Z world-space coordinate of the effect origin."

  CCSUsrMsg_WeaponSound:
    description: >
      Plays a weapon sound at a specific world position; used for sounds that
      must be heard at a precise location (fire, reload, bolt action).
    fields:
      entidx:
        description: "Entity index of the weapon producing the sound."
      origin_x:
        description: "X world-space coordinate of the sound origin."
      origin_y:
        description: "Y world-space coordinate of the sound origin."
      origin_z:
        description: "Z world-space coordinate of the sound origin."
      sound:
        description: "Sound event name to play."
      game_timestamp:
        description: "Server game-time at which the sound originated (used for latency-compensated audio sync)."
      source_soundscapeid:
        description: "Hash of the soundscape that was active when the sound was emitted."

  CCSUsrMsg_UpdateScreenHealthBar:
    description: >
      Animates the target's health-bar indicator (the hitmarker health-bar and
      the bomb defuse progress ring) on the HUD.
    fields:
      entidx:
        description: "Entity index of the entity whose health bar to update."
      healthratio_old:
        description: "Previous health ratio (0.0–1.0) for the animation start point."
      healthratio_new:
        description: "New health ratio (0.0–1.0) for the animation end point."
      style:
        description: "Style of health bar to update (0 = enemy, 1 = bomb defuse ring)."

  CCSUsrMsg_EntityOutlineHighlight:
    description: >
      Enables or disables the outline-highlight (X-ray glow) on a specific
      entity for the receiving client (used by spectator tools and some convars).
    fields:
      entidx:
        description: "Entity index to highlight or de-highlight."
      removehighlight:
        description: "True to remove the highlight, false to add it."

  CCSUsrMsg_AdjustMoney:
    description: >
      Directly adjusts the player's in-game money by the given amount and
      triggers the buy-menu update animation.
    fields:
      amount:
        description: "Dollar amount to add (positive) or remove (negative) from the player's account."

  CCSUsrMsg_ReportHit:
    description: >
      Sent to a player when their bullet registers a hit on an enemy; triggers
      the hit-confirmation sound and marker overlay.
    fields:
      pos_x:
        description: "Normalised screen-space X position of the hit marker."
      pos_y:
        description: "Normalised screen-space Y position of the hit marker."
      timestamp:
        description: "Game time of the hit event."
      pos_z:
        description: "Normalised screen-space Z depth of the hit marker."

  CCSUsrMsg_KillCam:
    description: >
      Configures the kill-cam (death-replay) observer mode and targets for the
      receiving dead player.
    fields:
      obs_mode:
        description: "Observer mode to use (4 = in-eye, 5 = chase-cam, 6 = roaming)."
      first_target:
        description: "Entity index of the primary observation target (usually the killer)."
      second_target:
        description: "Entity index of an optional secondary target."

  CCSUsrMsg_MatchEndConditions:
    description: >
      Communicates the match-win conditions to the client HUD so it can display
      the correct round/kill/time-limit indicators.
    fields:
      fraglimit:
        description: "Kill-limit to end the match (0 = no limit; used in Deathmatch)."
      mp_maxrounds:
        description: "Maximum number of rounds before the match ends."
      mp_winlimit:
        description: "Round-win count required to win the match."
      mp_timelimit:
        description: "Time limit of the match in minutes (0 = no limit)."

  CCSUsrMsg_AchievementEvent:
    description: >
      Triggers an achievement notification on the client.
    fields:
      achievement:
        description: "Achievement definition index."
      count:
        description: "Progress count toward the achievement."
      user_id:
        description: "User ID of the player who earned the achievement."

  CCSUsrMsg_QuestProgress:
    description: >
      Reports operation-mission progress earned by the player in the current
      match.
    fields:
      quest_id:
        description: "Operation mission (quest) ID."
      normal_points:
        description: "Normal points scored toward the quest objective."
      bonus_points:
        description: "Bonus points scored toward the quest objective."
      is_event_quest:
        description: "True when this quest is part of a limited-time event."

  CCSUsrMsg_ItemPickup:
    description: >
      Notifies the client that the player has picked up an item; triggers the
      weapon-pickup HUD indicator.
    fields:
      item:
        description: "Class name or item name of the picked-up weapon or equipment."

  CCSUsrMsg_AmmoDenied:
    description: >
      Notifies the client that a reload or ammo pick-up was denied and shows
      the 'no ammo' indicator.
    fields:
      ammoidx:
        description: "Ammo-type index that was denied."

  CCSUsrMsg_PlayerStatsUpdate:
    description: >
      Pushes an incremental update to the player's displayed match statistics
      (kills, deaths, assists, MVPs, etc.) so the scoreboard stays in sync.
    fields:
      version:
        description: "Protocol version of the stats message."
      stats:
        description: "List of (stat index, delta) pairs to apply."
      ehandle:
        description: "Entity handle of the player whose stats are being updated."
      crc:
        description: "Checksum for integrity verification of the stats payload."

  CCSUsrMsg_DamagePrediction:
    description: >
      Sent to the attacker to confirm or adjust predicted damage from a
      client-predicted hit so the client kill-feed and health can be reconciled.
    fields:
      command_num:
        description: "Client command number this prediction is aligned to."
      pellet_idx:
        description: "Shotgun pellet index (0 for single-bullet weapons)."
      victim_slot:
        description: "Player slot of the hit victim."
      victim_starting_health:
        description: "Victim's health before this hit was applied."
      victim_damage:
        description: "Actual damage amount applied to the victim."
      shoot_pos:
        description: "World-space position from which the shot originated."
      shoot_dir:
        description: "Angle of the shot direction at fire time."
      aim_punch:
        description: "Aim-punch angle active at fire time; used to reconcile punch-adjusted vs raw aim."

  CCSUsrMsg_SendLastKillerDamageToClient:
    description: >
      Sends the full damage-dealt breakdown of the killing blow to the dead
      player's client so the death-screen can display 'you took X damage'.
