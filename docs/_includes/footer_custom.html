<!-- Per-page live table-row filter (injected by footer_custom.html) -->
<script>
(function () {
  'use strict';
  var MIN_ROWS = 8; // only attach filter to tables that have this many body rows or more

  function attachFilter(table) {
    var tbody = table.tBodies[0];
    if (!tbody) return;
    var rows = Array.prototype.slice.call(tbody.rows);
    if (rows.length < MIN_ROWS) return;

    var wrap = document.createElement('div');
    wrap.className = 'jtd-filter';

    var input = document.createElement('input');
    input.type = 'search';
    input.placeholder = 'Filter…';
    input.setAttribute('aria-label', 'Filter table rows');

    var counter = document.createElement('span');
    counter.className = 'jtd-filter-count';
    counter.textContent = rows.length + ' entries';

    wrap.appendChild(input);
    wrap.appendChild(counter);
    table.parentNode.insertBefore(wrap, table);

    input.addEventListener('input', function () {
      var q = this.value.toLowerCase();
      var visible = 0;
      rows.forEach(function (row) {
        var show = !q || row.textContent.toLowerCase().indexOf(q) !== -1;
        row.hidden = !show;
        if (show) visible++;
      });
      // \u202f = narrow no-break space for tighter visual spacing around the slash
      counter.textContent = q
        ? visible + '\u202f/\u202f' + rows.length + ' entries'
        : rows.length + ' entries';
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    // .main-content is the just-the-docs wrapper for the rendered page body
    var tables = document.querySelectorAll('.main-content table, main table');
    Array.prototype.forEach.call(tables, attachFilter);
  });
}());
</script>
